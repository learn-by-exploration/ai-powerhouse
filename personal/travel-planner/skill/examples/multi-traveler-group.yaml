# Example: Multi-Traveler Group Trip — 4 People from 3 Cities → Bali
#
# Four friends from Tokyo, Singapore, and Bangalore plan to meet in Bali
# for a week. The planner must find the optimal convergence point (DPS
# airport), align arrival windows, and calculate group costs.
#
# Usage:
#   "Plan a group trip to Bali for 4 people:
#    - Shyam from Tokyo
#    - Priya from Singapore
#    - Rahul and Anita from Bangalore
#    Dates: around Christmas 2026, ±3 days flexible.
#    6-7 nights in Bali. Budget: $1500 per person all-in."

trip_request:
  travelers:
    - name: Shyam
      origin_city: Tokyo
      origin_airports: [NRT, HND]
      passport_nationality: IN
      residence_country: JP
      calendar:
        country_holidays: JP
        wfh_days: [Monday, Friday]
        leave_cost_per_day:
          amount: 15000
          currency: JPY
        work_hours: "09:00-18:00"
      preferences:
        max_travel_hours: 18
        max_stops: 1
        preferred_airlines: [ANA, JAL, Garuda]
        avoided_airlines: []
        cabin_class: economy
        miles_programs:
          - program: JAL Mileage Bank
            tier: regular
      budget:
        max_true_cost:
          amount: 220000
          currency: JPY
        max_ticket_price:
          amount: 150000
          currency: JPY

    - name: Priya
      origin_city: Singapore
      origin_airports: [SIN]
      passport_nationality: SG
      residence_country: SG
      calendar:
        country_holidays: SG
        wfh_days: [Wednesday]
        leave_cost_per_day:
          amount: 250
          currency: SGD
        work_hours: "09:00-18:00"
      preferences:
        max_travel_hours: 12
        max_stops: 0
        preferred_airlines: [Singapore Airlines, Scoot]
        avoided_airlines: []
        cabin_class: economy
        miles_programs:
          - program: KrisFlyer
            tier: silver
      budget:
        max_true_cost:
          amount: 2000
          currency: SGD
        max_ticket_price:
          amount: 1200
          currency: SGD

    - name: Rahul
      origin_city: Bangalore
      origin_airports: [BLR]
      passport_nationality: IN
      residence_country: IN
      calendar:
        country_holidays: IN
        wfh_days: [Friday]
        leave_cost_per_day:
          amount: 5000
          currency: INR
        work_hours: "09:30-18:30"
      preferences:
        max_travel_hours: 18
        max_stops: 1
        preferred_airlines: [IndiGo, Air India]
        avoided_airlines: []
        cabin_class: economy
        miles_programs: []
      budget:
        max_true_cost:
          amount: 100000
          currency: INR
        max_ticket_price:
          amount: 60000
          currency: INR

    - name: Anita
      origin_city: Bangalore
      origin_airports: [BLR]
      passport_nationality: IN
      residence_country: IN
      calendar:
        country_holidays: IN
        wfh_days: [Friday]
        leave_cost_per_day:
          amount: 4000
          currency: INR
        work_hours: "10:00-19:00"
      preferences:
        max_travel_hours: 18
        max_stops: 1
        preferred_airlines: []
        avoided_airlines: []
        cabin_class: economy
        miles_programs: []
      budget:
        max_true_cost:
          amount: 90000
          currency: INR
        max_ticket_price:
          amount: 55000
          currency: INR

  destinations:
    - city: Bali
      country: ID
      airports: [DPS]
      arrival_window:
        earliest: "2026-12-22"
        latest: "2026-12-26"
      departure_window:
        earliest: "2026-12-28"
        latest: "2027-01-02"
      purpose: sightseeing
      min_nights: 5
      max_nights: 8
      accommodation_needed: true
      ground_transport_to_next:
        preferred_mode: any
        max_hours: 2

  constraints:
    group_must_arrive_together: false
    max_arrival_spread_hours: 8         # Everyone should arrive within 8 hours
    booking_strategy: flexible           # Can book individually
    date_flexibility_days: 3
    trip_name: "Bali Christmas 2026 — Friends Trip"

# Expected agent activation (ALL agents):
#   1. tp-calendar     → JP holidays (Emperor's Birthday Dec 23), SG holidays
#                         (Christmas Dec 25), IN holidays (Christmas Dec 25)
#                         → Calculate leave windows for each traveler
#   2. tp-visa         → IN passports into Indonesia: Visa on Arrival ~$35
#                         SG passport: visa-free 30 days
#                         Transit visas if routing via KUL/SIN/BKK
#   3. tp-flight       → 3 origin searches in parallel:
#                         NRT/HND → DPS (Shyam)
#                         SIN → DPS (Priya) — short direct flights
#                         BLR → DPS (Rahul + Anita) — likely via SIN/KUL
#   4. tp-convergence  → Align arrival times at DPS within 8-hour window
#                         Score different date combinations
#                         Find best overlap of cheap flights from all origins
#   5. tp-accommodation → 1 villa/house for 4 people vs 2 hotel rooms
#                          Split cost per person
#   6. tp-transport    → DPS airport → hotel/villa (shared cab)
#   7. tp-optimizer    → Per-person True Cost in their home currency
#                         Group total for shared costs (accommodation, transport)
#                         Rank by group-total then individual fairness
#   8. tp-verifier     → Verify all 3 origin flights + accommodation
#
# Multi-traveler specific challenges:
#   - Currency normalization: JPY, SGD, INR all need common comparison
#   - Different budgets: Priya ($1500 SGD) vs Rahul (₹100K) — normalized
#   - Shared costs: Villa split 4 ways, cab split 4 ways
#   - Arrival alignment: SIN→DPS is 2.5h, BLR→DPS is 6-8h, NRT→DPS is 7-8h
#   - Leave costs differ: ¥15K/day (Shyam) vs ₹5K/day (Rahul) — affects optimal dates
