# Example: Multi-Stop Tour — Tokyo → Mumbai → Pune → Goa → Delhi → Tokyo
#
# Shyam flies a multi-city route through India, combining family visit
# with sightseeing. Ground transport between Indian cities varies.
#
# Usage:
#   "Plan a 3-week India trip: Tokyo to Mumbai, then Pune, Goa, Delhi,
#    and back to Tokyo. I want 2 nights Mumbai, 5 nights Pune (with family),
#    4 nights Goa, 3 nights Delhi. Budget under ¥350,000 all-in.
#    Search for multi-city fares vs split tickets."

trip_request:
  travelers:
    - name: Shyam
      origin_city: Tokyo
      origin_airports: [NRT, HND]
      passport_nationality: IN
      residence_country: JP
      calendar:
        country_holidays: JP
        wfh_days: [Monday, Friday]
        leave_cost_per_day:
          amount: 15000
          currency: JPY
        work_hours: "09:00-18:00"
      preferences:
        max_travel_hours: 24
        max_stops: 2
        preferred_airlines: [ANA, JAL, Air India]
        avoided_airlines: []
        cabin_class: economy
        miles_programs:
          - program: JAL Mileage Bank
            tier: regular
      budget:
        max_true_cost:
          amount: 350000
          currency: JPY
        max_ticket_price:
          amount: 250000
          currency: JPY

  destinations:
    - city: Mumbai
      country: IN
      airports: [BOM]
      arrival_window:
        earliest: "2026-11-15"
        latest: "2026-11-18"
      departure_window:
        earliest: "2026-11-17"
        latest: "2026-11-20"
      purpose: sightseeing
      min_nights: 2
      max_nights: 3
      accommodation_needed: true
      ground_transport_to_next:
        preferred_mode: any              # train or flight to Pune
        max_hours: 5

    - city: Pune
      country: IN
      airports: [PNQ]
      arrival_window:
        earliest: "2026-11-19"
        latest: "2026-11-21"
      departure_window:
        earliest: "2026-11-24"
        latest: "2026-11-26"
      purpose: family
      min_nights: 4
      max_nights: 6
      accommodation_needed: false        # Staying with family
      ground_transport_to_next:
        preferred_mode: flight
        max_hours: 3

    - city: Goa
      country: IN
      airports: [GOI]
      arrival_window:
        earliest: "2026-11-25"
        latest: "2026-11-27"
      departure_window:
        earliest: "2026-11-29"
        latest: "2026-12-01"
      purpose: sightseeing
      min_nights: 3
      max_nights: 5
      accommodation_needed: true
      ground_transport_to_next:
        preferred_mode: flight
        max_hours: 4

    - city: Delhi
      country: IN
      airports: [DEL]
      arrival_window:
        earliest: "2026-11-30"
        latest: "2026-12-02"
      departure_window:
        earliest: "2026-12-03"
        latest: "2026-12-06"
      purpose: sightseeing
      min_nights: 2
      max_nights: 4
      accommodation_needed: true
      ground_transport_to_next:
        preferred_mode: flight           # DEL → NRT/HND return flight
        max_hours: 24

  constraints:
    group_must_arrive_together: false
    booking_strategy: flexible
    date_flexibility_days: 2
    trip_name: "India Tour 2026 — Mumbai-Pune-Goa-Delhi"

# Expected agent activation:
#   1. tp-calendar  → JP holidays in Nov-Dec, calculate leave days for 3-week trip
#   2. tp-visa      → IN passport → no visa needed, skip
#   3. tp-flight    → Multi-city: NRT→BOM, PNQ→GOI, GOI→DEL, DEL→NRT
#                     Also search: single multi-city ticket vs split one-ways
#   4. tp-transport → BOM→Pune (train/bus), airport transfers at each city
#   5. tp-accommodation → Hotels for Mumbai (2n), Goa (4n), Delhi (3n)
#   6. tp-optimizer → True Cost across all legs and stays, rank strategies  
#   7. tp-verifier  → Verify top 3 plans
#
# Key strategy comparisons:
#   A) Single multi-city ticket: NRT→BOM, PNQ→GOI, GOI→DEL, DEL→NRT
#   B) Split: RT NRT↔DEL + separate domestic flights
#   C) Open-jaw: NRT→BOM + DEL→NRT + separate domestics
#
# Skipped agents:
#   - tp-convergence (solo trip)
