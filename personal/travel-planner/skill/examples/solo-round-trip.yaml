# Example: Solo Round-Trip Tokyo → Pune
#
# Shyam flies from Tokyo to Pune for Diwali, returning after ~10 days.
# Uses the travel planner with date flexibility and leave optimization.
#
# Usage:
#   "Plan a round-trip from Tokyo to Pune for Diwali 2026.
#    I can take ±3 days flexibility. Minimize total leave days.
#    Budget under ¥200,000 all-in."

trip_request:
  travelers:
    - name: Shyam
      origin_city: Tokyo
      origin_airports: [NRT, HND]
      passport_nationality: IN
      residence_country: JP
      calendar:
        country_holidays: JP
        wfh_days: [Monday, Friday]
        leave_cost_per_day:
          amount: 15000
          currency: JPY
        work_hours: "09:00-18:00"
      preferences:
        max_travel_hours: 20
        max_stops: 1
        preferred_airlines: [ANA, JAL, Air India]
        avoided_airlines: [Spirit]
        cabin_class: economy
        miles_programs:
          - program: JAL Mileage Bank
            tier: regular
      budget:
        max_true_cost:
          amount: 200000
          currency: JPY
        max_ticket_price:
          amount: 150000
          currency: JPY

  destinations:
    - city: Pune
      country: IN
      airports: [PNQ, BOM]
      arrival_window:
        earliest: "2026-10-17"
        latest: "2026-10-22"
      departure_window:
        earliest: "2026-10-27"
        latest: "2026-11-01"
      purpose: family
      min_nights: 7
      max_nights: 12
      accommodation_needed: false       # Staying with family
      ground_transport_to_next:
        preferred_mode: any
        max_hours: 5

  constraints:
    group_must_arrive_together: false
    booking_strategy: individual
    date_flexibility_days: 3
    trip_name: "Diwali 2026 — Pune"

# Expected agent activation:
#   1. tp-calendar  → Find Diwali dates, JP holidays, calculate leave windows
#   2. tp-visa      → IN passport + JP residence → no visa for India, skip
#   3. tp-flight    → Search NRT/HND → BOM/PNQ, round-trip + multi-city
#   4. tp-transport → BOM ↔ Pune ground options (if flying into BOM)
#   5. tp-optimizer → True Cost with leave_cost, rank plans
#   6. tp-verifier  → Cross-check top 3 prices
#
# Skipped agents:
#   - tp-accommodation (staying with family)
#   - tp-convergence (solo trip)
